{% extends "base.html" %}
{% block content %}
<section class="banner-card p-4 p-lg-5">
    <div class="row align-items-center g-4">
        <div class="col-lg-7">
            <span class="hero-chip mb-3"><i class="bi bi-heart-pulse"></i> Service interruption</span>
            <h1 class="display-6 fw-bold mb-2">Something went wrong on our side.</h1>
            <p class="text-white-50 mb-0">Our team has been notified. Please try again shortly or return to the main dashboard.</p>
        </div>
        <div class="col-lg-5 text-lg-end">
            <div class="hero-floating-card p-4">
                <div class="empty-illustration mx-auto mb-3"><i class="bi bi-life-preserver fs-2"></i></div>
                <div class="fw-semibold mb-2">Unexpected issue</div>
                <a class="bh-btn bh-btn-surface" href="{% url 'home' %}"><i class="bi bi-house"></i><span>Back to home</span></a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
