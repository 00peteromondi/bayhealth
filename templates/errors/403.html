{% extends "base.html" %}
{% block content %}
<section class="banner-card p-4 p-lg-5">
    <div class="row align-items-center g-4">
        <div class="col-lg-7">
            <span class="hero-chip mb-3"><i class="bi bi-shield-lock"></i> Access restricted</span>
            <h1 class="display-6 fw-bold mb-2">You do not have permission to open this area.</h1>
            <p class="text-white-50 mb-0">Access is limited by your current role, hospital membership, or sign-in state.</p>
        </div>
        <div class="col-lg-5 text-lg-end">
            <div class="hero-floating-card p-4">
                <div class="empty-illustration mx-auto mb-3"><i class="bi bi-lock fs-2"></i></div>
                <div class="fw-semibold mb-2">Role check failed</div>
                <a class="bh-btn bh-btn-surface" href="{% url 'home' %}"><i class="bi bi-speedometer2"></i><span>Open dashboard</span></a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
