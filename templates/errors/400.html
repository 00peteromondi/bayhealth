{% extends "base.html" %}
{% block content %}
<section class="banner-card p-4 p-lg-5">
    <div class="row align-items-center g-4">
        <div class="col-lg-7">
            <span class="hero-chip mb-3"><i class="bi bi-shield-exclamation"></i> Request error</span>
            <h1 class="display-6 fw-bold mb-2">We could not process that request.</h1>
            <p class="text-white-50 mb-0">Please review the details and try again from the current BayAfya workspace.</p>
        </div>
        <div class="col-lg-5 text-lg-end">
            <div class="hero-floating-card p-4">
                <div class="empty-illustration mx-auto mb-3"><i class="bi bi-exclamation-triangle fs-2"></i></div>
                <div class="fw-semibold mb-2">Invalid request</div>
                <a class="bh-btn bh-btn-surface" href="{% url 'home' %}"><i class="bi bi-house"></i><span>Return home</span></a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
