{% extends "base.html" %}
{% block content %}
<div class="card p-4 p-lg-5 text-center">
    <div class="mx-auto feature-icon mb-4"><i class="bi bi-bag-check-fill fs-3"></i></div>
    <span class="section-kicker">Pharmacy</span>
    <h1 class="display-6 fw-bold mt-3">Order confirmation</h1>
    <p class="text-secondary">Order #{{ order.id }} has been submitted successfully.</p>
    <div class="row justify-content-center g-3 mt-1">
        <div class="col-md-3"><div class="metric-card"><div class="text-secondary small">Status</div><div class="fw-bold">{{ order.get_status_display }}</div></div></div>
        <div class="col-md-3"><div class="metric-card"><div class="text-secondary small">Total</div><div class="fw-bold">{{ order.total_amount }}</div></div></div>
    </div>
</div>
{% endblock %}
